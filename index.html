<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky1:#79c0f2; --sky2:#a8d8f0; --grass:#5bad3a; --grass-d:#3f7d28;
    --dirt:#7a5334; --dirt-d:#5b3d25;
    --panel:#2b2540; --panel2:#352c52; --panel-line:#1c1830;
    --text:#ffffff; --muted:#c9c3e0;
    --done:#3fbf52; --done-d:#2c8c3a;
    --review:#e0a72e; --review-d:#a97c18;
    --empty:#4a4266; --empty-d:#332d4a;
    --gold:#ffd24a; --accent:#7b5cff; --accent-d:#5a3fd6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;color:var(--text);
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
    background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 30%,#bfe3a8 60%,var(--grass) 100%) fixed;min-height:100vh;}
  body::before{content:"";position:fixed;top:0;left:0;right:0;height:120px;z-index:0;pointer-events:none;
    background:radial-gradient(circle at 12% 30px,#fff 0 18px,transparent 19px),radial-gradient(circle at 20% 42px,#fff 0 22px,transparent 23px),radial-gradient(circle at 70% 26px,#fff 0 16px,transparent 17px),radial-gradient(circle at 82% 44px,#fff 0 24px,transparent 25px);opacity:.7;}
  #app{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:14px 12px 96px;}
  .pixel{font-family:"Pixelify Sans","Courier New",monospace;font-weight:700;letter-spacing:.5px;}
  .card h2{font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;letter-spacing:0;}

  header.top{text-align:center;padding:6px 0 6px;}
  header.top h1{margin:0;font-size:28px;text-shadow:2px 2px 0 var(--grass-d),3px 3px 0 rgba(0,0,0,.25);}
  header.top .month{display:inline-block;margin-top:8px;background:var(--dirt);color:#fff;padding:4px 14px;border:3px solid var(--dirt-d);box-shadow:3px 3px 0 rgba(0,0,0,.25);font-size:15px;}
  .whoami{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:9px;font-size:13px;color:#fff;}
  .whoami .wa-face{width:26px;height:26px;border:2px solid var(--panel-line);overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#6ec1f0,#8ed07a);}
  .whoami .wa-face img{width:100%;height:100%;object-fit:contain;}
  .whoami a{color:var(--gold);cursor:pointer;text-decoration:underline;}
  .sync{font-size:11px;color:var(--muted);margin-top:4px;text-align:center;}

  .picker{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
  .pick{display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--panel2);border:4px solid var(--panel-line);box-shadow:4px 4px 0 rgba(0,0,0,.28);padding:12px 8px;cursor:pointer;}
  .pick:active{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(0,0,0,.28);}
  .pick .pf{width:64px;height:64px;border:3px solid var(--panel-line);overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#7fc9f2,#8ed07a);}
  .pick .pf img{width:100%;height:100%;object-fit:contain;}
  .pick b{font-size:15px;}
  .pick small{color:var(--muted);font-size:11px;}
  .hint{color:var(--muted);font-size:13px;margin:0 0 10px;line-height:1.4;}

  .daynav{display:flex;align-items:center;gap:8px;margin:12px 0;}
  .daynav button{flex:0 0 auto;background:var(--panel2);border:3px solid var(--panel-line);color:#fff;font-size:18px;width:44px;height:44px;cursor:pointer;box-shadow:2px 2px 0 rgba(0,0,0,.3);}
  .daynav button:disabled{opacity:.35;cursor:default;}
  .daynav .cur{flex:1;text-align:center;background:var(--panel);border:3px solid var(--panel-line);padding:8px;box-shadow:3px 3px 0 rgba(0,0,0,.28);}
  .daynav .cur b{display:block;font-size:15px;color:#fff;}
  .daynav .cur small{color:var(--muted);font-size:12px;text-transform:capitalize;}

  .card{background:var(--panel);border:4px solid var(--panel-line);box-shadow:5px 5px 0 rgba(0,0,0,.28);padding:14px;margin-bottom:14px;}
  .card h2{margin:0 0 12px;font-size:16px;color:#fff;}
  .mombar{display:flex;align-items:center;gap:10px;background:var(--panel2);border:4px solid var(--panel-line);box-shadow:5px 5px 0 rgba(0,0,0,.28);padding:12px 14px;margin-bottom:14px;font-size:14px;color:#fff;}
  .mombar .txt{flex:1;line-height:1.3;}
  .lockbtn{flex:0 0 auto;background:var(--accent);border:3px solid var(--accent-d);color:#fff;padding:10px 14px;font-size:15px;cursor:pointer;box-shadow:3px 3px 0 rgba(0,0,0,.3);}
  .lockbtn.on{background:var(--done);border-color:var(--done-d);}

  .prize{background:var(--panel2);border:3px dashed var(--gold);padding:8px 10px;margin-bottom:10px;font-size:12.5px;color:var(--gold);text-align:center;}
  .rank-row{display:flex;align-items:center;gap:12px;padding:8px;border-bottom:2px solid var(--panel-line);}
  .rank-row:last-child{border-bottom:none;}
  .rank-medal{width:28px;text-align:center;font-size:20px;color:#fff;}
  .rank-face{width:38px;height:38px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#6ec1f0,#8ed07a);border:2px solid var(--panel-line);overflow:hidden;font-size:22px;}
  .rank-face img{width:100%;height:100%;object-fit:contain;}
  .rank-name{flex:1;font-size:15px;color:#fff;}
  .rank-name small{display:block;color:var(--muted);font-size:11px;}
  .rank-pts{font-weight:700;font-size:17px;color:var(--gold);}
  .rank-pts .tick{color:var(--done);}

  .member{background:var(--panel);border:4px solid var(--panel-line);box-shadow:5px 5px 0 rgba(0,0,0,.28);padding:12px;margin-bottom:14px;}
  .member.mine{border-color:var(--gold);}
  .m-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .m-face{width:56px;height:56px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#7fc9f2,#8ed07a);border:3px solid var(--panel-line);box-shadow:2px 2px 0 rgba(0,0,0,.3);overflow:hidden;font-size:32px;}
  .m-face img{width:100%;height:100%;object-fit:contain;}
  .m-info{flex:1;min-width:0;}
  .m-name{font-size:16px;font-weight:700;color:#fff;}
  .m-name .you{background:var(--gold);color:#4a2f00;font-size:10px;padding:1px 6px;margin-left:4px;vertical-align:middle;}
  .m-name span.age{color:var(--muted);font-weight:400;font-size:12px;}
  .m-lvl{font-size:11px;color:var(--muted);margin-top:2px;}
  .m-badge{font-size:10px;color:#ffe6a6;margin-top:2px;}
  .m-pts{flex:0 0 auto;text-align:center;background:var(--dirt);border:3px solid var(--dirt-d);padding:4px 10px;box-shadow:2px 2px 0 rgba(0,0,0,.3);}
  .m-pts b{font-size:18px;color:var(--gold);display:block;}
  .m-pts small{font-size:10px;color:#e7d9c4;text-transform:uppercase;}
  .bar{height:12px;background:var(--empty-d);border:2px solid var(--panel-line);margin-bottom:12px;overflow:hidden;}
  .bar>i{display:block;height:100%;background:repeating-linear-gradient(90deg,var(--done) 0 8px,var(--done-d) 8px 10px);}
  .tasks{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .task{display:flex;align-items:center;gap:8px;padding:11px 10px;cursor:pointer;border:3px solid var(--empty-d);background:var(--empty);box-shadow:2px 2px 0 rgba(0,0,0,.28);font-size:13px;line-height:1.15;user-select:none;color:#fff;position:relative;}
  .task.locked{opacity:.55;cursor:not-allowed;}
  .task .tico{font-size:17px;}
  .task .ttl{flex:1;min-width:0;}
  .task .tstate{width:20px;text-align:center;font-size:16px;}
  .task.review{background:var(--review);border-color:var(--review-d);color:#2a2000;}
  .task.done{background:var(--done);border-color:var(--done-d);color:#0d2a12;}
  .task .del{position:absolute;top:-8px;right:-8px;width:20px;height:20px;background:#5b3d25;border:2px solid #3c2717;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .addtask{display:flex;gap:7px;margin-top:10px;}
  .addtask input{flex:1;min-width:0;padding:9px 10px;border:3px solid var(--panel-line);background:var(--empty-d);color:#fff;font-size:14px;outline:none;}
  .addtask input::placeholder{color:var(--muted);}
  .addtask button{flex:0 0 auto;width:42px;background:var(--accent);border:3px solid var(--accent-d);color:#fff;font-size:20px;cursor:pointer;box-shadow:2px 2px 0 rgba(0,0,0,.3);}
  .remind{display:flex;align-items:center;gap:8px;margin-top:11px;font-size:13px;color:var(--muted);}
  .remind input{background:var(--empty-d);border:3px solid var(--panel-line);color:#fff;padding:7px 8px;font-size:14px;}

  .lrow{display:flex;align-items:center;gap:12px;background:var(--panel2);border:3px solid var(--panel-line);box-shadow:3px 3px 0 rgba(0,0,0,.25);padding:11px 12px;margin-bottom:9px;}
  .lrow .chk{width:24px;height:24px;flex:0 0 auto;border:3px solid var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .lrow.bought .chk{background:var(--done);border-color:var(--done-d);}
  .lrow.bought .lt{text-decoration:line-through;color:var(--muted);}
  .lrow .lt{flex:1;color:#fff;}
  .datebadge{flex:0 0 auto;width:50px;text-align:center;background:var(--dirt);border:3px solid var(--dirt-d);padding:5px 0;}
  .datebadge b{display:block;font-size:18px;color:#fff;line-height:1;}
  .datebadge small{font-size:10px;color:#e7d9c4;text-transform:uppercase;}
  .lrow .when{font-size:11px;color:var(--muted);margin-top:2px;}
  .add-row{display:flex;gap:8px;margin-bottom:10px;}
  .add-row input{flex:1;min-width:0;padding:11px;border:3px solid var(--panel-line);background:var(--empty-d);color:#fff;font-size:15px;outline:none;}
  .add-row input::placeholder{color:var(--muted);}
  .addbtn{flex:0 0 auto;width:46px;background:var(--accent);border:3px solid var(--accent-d);color:#fff;font-size:22px;cursor:pointer;box-shadow:2px 2px 0 rgba(0,0,0,.3);}
  .evform{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .evform label{font-size:12px;color:var(--muted);margin-bottom:-4px;}
  .evform input,.evform select{padding:12px;border:3px solid var(--panel-line);background:var(--empty-d);color:#fff;font-size:15px;outline:none;width:100%;}
  .evform input::placeholder{color:var(--muted);}
  .addwide{padding:13px;background:var(--accent);border:3px solid var(--accent-d);color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:2px 2px 0 rgba(0,0,0,.3);}

  nav.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;z-index:20;background:var(--dirt);border-top:4px solid var(--dirt-d);padding:6px 0 calc(6px + env(safe-area-inset-bottom));}
  nav.tabs button{flex:1;background:none;border:none;color:#e7d9c4;font-family:inherit;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;}
  nav.tabs button .ic{font-size:20px;}
  nav.tabs button.active{color:#fff;}
  .fail{background:var(--panel);border:4px solid var(--panel-line);padding:24px;text-align:center;color:var(--muted);}

  #toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#17102b;border:3px solid var(--panel-line);color:#fff;padding:10px 16px;font-size:13px;z-index:70;display:none;box-shadow:0 4px 10px rgba(0,0,0,.4);max-width:90%;text-align:center;}
  #toast.on{display:block;}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden;display:none;}
  #confetti.on{display:block;}
  .conf{position:absolute;width:10px;height:10px;top:-12px;animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);}}
  #hero{position:fixed;left:50%;bottom:-45%;transform:translateX(-50%);width:200px;z-index:60;pointer-events:none;display:none;filter:drop-shadow(0 6px 10px rgba(0,0,0,.35));}
  #hero.on{display:block;animation:heroPop 4.4s ease forwards;}
  #hero img{width:100%;}
  #hero .cheer{text-align:center;font-family:"Pixelify Sans","Courier New",monospace;font-weight:700;color:#fff;text-shadow:2px 2px 0 #a95a0e;font-size:20px;margin-top:-6px;}
  @keyframes heroPop{0%{bottom:-45%;}14%{bottom:16%;}84%{bottom:16%;}100%{bottom:-45%;}}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <h1 class="pixel">🏆 Наши достижения</h1>
    <div class="month pixel" id="month">—</div>
    <div class="whoami" id="whoami"></div>
  </header>
  <div id="content"><div class="card" style="text-align:center">Загрузка… ⏳</div></div>
</div>

<nav class="tabs">

  <button id="tab-shop" onclick="switchTab('shop')"><span class="ic">🛒</span>Покупки</button>
  <button id="tab-cal" onclick="switchTab('cal')"><span class="ic">📅</span>Даты</button>
  <button id="tab-goals" onclick="switchTab('goals')"><span class="ic">🎯</span>Цели</button>
</nav>

<div id="toast"></div>
<div id="confetti"></div>
<div id="hero"><img id="heroImg" alt=""><div class="cheer">Победа! 🎉</div></div>

<script>
  const SUPA_URL='https://yqjtiakrlyehfmawbmpq.supabase.co';
  const SUPA_KEY='sb_publishable_FFxhJ5tXbO4_P-nZWSUK_Q_eMOazsrZ';
  async function db(path,opts){ opts=opts||{}; opts.headers=Object.assign({apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json'},opts.headers||{});
    const r=await fetch(SUPA_URL+'/rest/v1/'+path,opts); if(!r.ok) throw new Error(r.status+' '+await r.text()); const t=await r.text(); return t?JSON.parse(t):null; }

  const tg = window.Telegram ? window.Telegram.WebApp : null;
  if(tg){ try{ tg.ready(); tg.expand(); }catch(e){} }
  function haptic(t){ try{ if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred(t||'light'); }catch(e){} }
  let TGID=null, TGNAME='';
  try{ if(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user){ TGID=tg.initDataUnsafe.user.id; TGNAME=tg.initDataUnsafe.user.first_name||''; } }catch(e){}

  const DATA_STATIC = {"month":"Июль 2026","heroImage":"hero.png","members":[
    {"id":"grigoriy","name":"Григорий","age":12,"role":"child","character":"🦊","image":"fox.png","tasks":[
      {"id":"read","title":"Читать","icon":"📖"},{"id":"teeth","title":"Чистить зубы","icon":"🦷"},{"id":"walk","title":"Гулять","icon":"🌳"},{"id":"screen","title":"Гаджеты ≤ 3 ч","icon":"📱"},{"id":"bed","title":"Заправить кровать","icon":"🛏️"},{"id":"math","title":"Таблица умножения","icon":"✖️"}]},
    {"id":"kirill","name":"Кирилл","age":10,"role":"child","character":"🐱","image":"cat.png","tasks":[
      {"id":"read","title":"Читать","icon":"📖"},{"id":"teeth","title":"Чистить зубы","icon":"🦷"},{"id":"walk","title":"Гулять","icon":"🌳"},{"id":"screen","title":"Гаджеты ≤ 3 ч","icon":"📱"},{"id":"bed","title":"Заправить кровать","icon":"🛏️"},{"id":"copy","title":"Переписать текст","icon":"📝"}]},
    {"id":"mama","name":"Мама","age":null,"role":"parent_admin","character":"🐉","image":"dragon.png","tasks":[
      {"id":"sport","title":"Зарядка","icon":"🤸"},{"id":"read","title":"Читать","icon":"📖"}]},
    {"id":"evgeniy","name":"Папа","age":null,"role":"parent_admin","character":"🦁","image":"lion.png","tasks":[
      {"id":"sport","title":"Спорт","icon":"🤸"},{"id":"read","title":"Читать","icon":"📖"}]}]};

  const LEVELS=['Новичок','Ученик','Растёт','Умелец','Мастер','Герой','Легенда'];
  const MONTHS=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
  const WD=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  let DATA=DATA_STATIC, momMode=false, tab='home', loaded=false;
  let today=new Date(); today.setHours(0,0,0,0);
  let curDate=new Date(today);
  let ME=null; // member id
  let MARKS={}, CUSTOM={}, SHOP=[], EVENTS=[], WISHES=[];
  let REMIND={}; try{REMIND=JSON.parse(localStorage.getItem('remind'))||{};}catch(e){}

  function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function plural(n,f){n=Math.abs(n)%100;const n1=n%10;if(n>10&&n<20)return f[2];if(n1>1&&n1<5)return f[1];if(n1===1)return f[0];return f[2];}
  function key(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function monthPrefix(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
  function addDays(base,d){ const x=new Date(base); x.setDate(x.getDate()+d); x.setHours(0,0,0,0); return x; }
  function isParent(m){ return m && (m.role==='parent'||m.role==='parent_admin'); }
  function member(id){ return DATA.members.find(x=>x.id===id); }
  function meMember(){ return ME?member(ME):null; }
  function meIsParent(){ return isParent(meMember()); }
  function allTasks(m){ return m.tasks.concat(CUSTOM[m.id]||[]); }
  function status(mid,tid){ return MARKS[key(curDate)+'|'+mid+'|'+tid]||'empty'; }
  function monthPoints(mid){ let n=0; const mp=monthPrefix(curDate)+'-'; for(const k in MARKS){ const p=k.split('|'); if(p[1]===mid && p[0].indexOf(mp)===0 && MARKS[k]==='done') n++; } return n; }
  function levelOf(pts){ return {level:Math.min(7,1+Math.floor(pts/5)), progress:(pts%5)/5}; }
  function reviewCount(){ let n=0; const kd=key(curDate); DATA.members.forEach(m=>{ if(isParent(m))return; allTasks(m).forEach(t=>{ if(MARKS[kd+'|'+m.id+'|'+t.id]==='review')n++; }); }); return n; }
  function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('on'); clearTimeout(window.__tt); window.__tt=setTimeout(()=>el.classList.remove('on'),1900); }

  // ---------- DB ops ----------
  async function loadAll(){
    const mp=monthPrefix(curDate);
    const start=mp+'-01', end=mp+'-31';
    const [marks,cust,shop,evs,wsh]=await Promise.all([
      db('marks?select=*&day=gte.'+start+'&day=lte.'+end),
      db('custom_tasks?select=*'),
      db('shopping?select=*&order=id.desc'),
      db('events?select=*&order=on_date.asc'),
      db('wishes?select=*&order=id.asc')
    ]);
    MARKS={}; (marks||[]).forEach(m=>MARKS[m.day+'|'+m.member_id+'|'+m.task_id]=m.status);
    CUSTOM={}; (cust||[]).forEach(c=>{(CUSTOM[c.member_id]=CUSTOM[c.member_id]||[]).push({id:c.id,title:c.title,icon:c.icon||'📌'});});
    SHOP=(shop||[]).map(s=>({id:s.id,text:s.txt,bought:s.bought}));
    EVENTS=(evs||[]).map(e=>({id:e.id,text:e.txt,date:e.on_date,who:e.who||'all'}));
    WISHES=(wsh||[]).map(w=>({id:w.id,member:w.member_id,kind:w.kind||'want',title:w.title,note:w.note||'',done:!!w.done}));
  }
  async function loadMarksOnly(){
    const mp=monthPrefix(curDate);
    const marks=await db('marks?select=*&day=gte.'+mp+'-01&day=lte.'+mp+'-31');
    MARKS={}; (marks||[]).forEach(m=>MARKS[m.day+'|'+m.member_id+'|'+m.task_id]=m.status);
  }
  async function pushMark(mid,tid,val){ await db('marks',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({day:key(curDate),member_id:mid,task_id:tid,status:val})}); }
  async function loadIdentity(){ if(!TGID)return null; const rows=await db('identities?select=*&tg_id=eq.'+TGID); return (rows&&rows.length)?rows[0].member_id:null; }
  async function claimIdentity(id){ if(TGID){ await db('identities',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({tg_id:TGID,member_id:id,tg_name:TGNAME})}); } }

  // ---------- render ----------
  function render(){
    document.getElementById('month').textContent=DATA.month||'';
    renderWhoami();
    const c=document.getElementById('content');
    if(!loaded){ return; }
    if(!ME){ c.innerHTML=renderPicker(); return; }
    c.innerHTML = tab==='home'?renderHome():(tab==='shop'?renderShop():(tab==='cal'?renderCal():renderGoals()));
  }
  function face(m){ return m.image?`<img src="${m.image}" alt="" onerror="this.replaceWith(document.createTextNode('${m.character||''}'))">`:(m.character||''); }
  function renderWhoami(){
    const w=document.getElementById('whoami');
    if(!ME){ w.innerHTML=''; return; }
    const m=meMember(); const canSwitch=!TGID; // в Telegram личность закреплена
    w.innerHTML=`Ты: <span class="wa-face">${face(m)}</span> <b>${esc(m.name)}</b>`+(canSwitch?` · <a onclick="changeMe()">сменить</a>`:'');
  }
  function renderPicker(){
    let cards=DATA.members.map(m=>`<div class="pick" onclick="pickMe('${m.id}')"><div class="pf">${face(m)}</div><b>${esc(m.name)}</b><small>${isParent(m)?'взрослый':((m.age||'')+' лет')}</small></div>`).join('');
    const note=TGID?'Это запомнится за твоим Telegram — потом отмечать сможешь только свои задания.':'Выбери себя (демо-режим на этом устройстве).';
    return `<div class="card"><h2>Кто ты?</h2><div class="hint">${note} Видеть достижения будешь у всех — это соревнование 🏆.</div><div class="picker">${cards}</div></div>`;
  }
  window.pickMe=async function(id){ ME=id; momMode=false; localStorage.setItem('me_fallback',id); render(); try{ await claimIdentity(id); }catch(e){ toast('Не удалось сохранить в базу'); } haptic('medium'); };
  window.changeMe=function(){ ME=null; momMode=false; localStorage.removeItem('me_fallback'); render(); };

  function renderHome(){
    const rc=reviewCount();
    const isToday=key(curDate)===key(today);
    const isYest=key(curDate)===key(addDays(today,-1));
    let h='';
    h+=`<div class="daynav"><button onclick="shiftDay(-1)">‹</button>
      <div class="cur"><b>${isToday?'Сегодня':(isYest?'Вчера':curDate.getDate()+' '+MONTHS[curDate.getMonth()])}</b><small>${WD[curDate.getDay()]}, ${curDate.getDate()} ${MONTHS[curDate.getMonth()]}</small></div>
      <button onclick="shiftDay(1)" ${isToday?'disabled':''}>›</button></div>`;
    if(meIsParent()){
      h+=`<div class="mombar"><div class="txt">${ momMode
        ? '👑 <b>Режим проверки включён</b> — жми жёлтое ⏳ у детей, чтобы подтвердить ✅.'
        : (rc? `⏳ <b>${rc}</b> ${plural(rc,['задание','задания','заданий'])} ждут проверки — включи режим проверки.` : 'Ты взрослый: свои задания отмечаешь сам, детские — подтверждаешь 👑.') }</div>
        <button class="lockbtn ${momMode?'on':''}" onclick="toggleMom()">${momMode?'🔓':'🔒'}</button></div>`;
    } else {
      h+=`<div class="mombar"><div class="txt">Отмечай <b>свои</b> задания — они уйдут «на проверку» ⏳. Мама или папа подтвердят ✅.</div></div>`;
    }
    const ranked=DATA.members.map(m=>({m,pts:monthPoints(m.id)})).sort((a,b)=>b.pts-a.pts);
    const medals=['🥇','🥈','🥉'];
    h+=`<div class="card"><h2>🏅 Рейтинг месяца</h2><div class="prize">🎁 В конце месяца — приз тому, у кого больше всех галочек</div>`;
    ranked.forEach((r,i)=>{ const lv=levelOf(r.pts); h+=`<div class="rank-row"><div class="rank-medal">${medals[i]||(i+1)}</div><div class="rank-face">${face(r.m)}</div><div class="rank-name">${esc(r.m.name)}<small>${LEVELS[lv.level-1]}</small></div><div class="rank-pts">${r.pts} <span class="tick">✓</span></div></div>`; });
    h+=`</div>`;
    DATA.members.forEach(m=>{ h+=renderMember(m); });
    return h;
  }
  function canAdd(m){ return ME===m.id || meIsParent(); }
  function renderMember(m){
    const pts=monthPoints(m.id); const lv=levelOf(pts); const pct=Math.round(lv.progress*100);
    const mine=ME===m.id;
    const t=allTasks(m).map(tk=>{ const st=status(m.id,tk.id); const cls=st==='done'?'done':(st==='review'?'review':''); const ic=st==='done'?'✅':(st==='review'?'⏳':'▫️');
      const canTap=(ME===m.id)||(meIsParent()&&momMode&&!isParent(m));
      const locked=canTap?'':'locked';
      const isCustom=(CUSTOM[m.id]||[]).some(x=>x.id===tk.id);
      const del=(isCustom&&canAdd(m))?`<span class="del" onclick="event.stopPropagation();delTask('${m.id}','${tk.id}')">✕</span>`:'';
      return `<div class="task ${cls} ${locked}" onclick="tapTask('${m.id}','${tk.id}')"><span class="tico">${tk.icon||'📌'}</span><span class="ttl">${esc(tk.title)}</span><span class="tstate">${ic}</span>${del}</div>`; }).join('');
    const addRow=canAdd(m)?`<div class="addtask"><button class="addwide" style="flex:1;width:100%" onclick="addTask('${m.id}')">➕ Добавить дело</button></div>`:'';
    return `<div class="member ${mine?'mine':''}"><div class="m-head"><div class="m-face">${face(m)}</div><div class="m-info"><div class="m-name">${esc(m.name)} ${m.age?`<span class="age">${m.age} лет</span>`:''}${mine?'<span class="you">ты</span>':''}</div><div class="m-lvl">${LEVELS[lv.level-1]} · ур. ${lv.level} · ${pts} очк.</div>${isParent(m)?'<div class="m-badge">взрослый — отмечает сам</div>':''}</div><div class="m-pts"><b>${pts}</b><small>очков</small></div></div><div class="bar"><i style="width:${pct}%"></i></div><div class="tasks">${t}</div>${addRow}<div class="remind">🔔 Напоминание: <input type="time" value="${REMIND[m.id]||''}" onchange="setRemind('${m.id}',this.value)"></div></div>`;
  }

  window.tapTask=async function(mid,tid){
    const target=member(mid); const me=meMember(); const own=ME===mid;
    let nv=null, cel=false;
    if(own){
      const st=status(mid,tid);
      if(isParent(me)){ if(st==='done'){nv='empty';haptic('rigid');} else {nv='done';haptic('medium');cel=true;} }
      else { if(st==='empty'){nv='review';haptic('light');smallConfetti();} else if(st==='review'){nv='empty';haptic('light');} else {return;} }
    } else {
      if(meIsParent()&&momMode&&!isParent(target)){
        const st=status(mid,tid);
        if(st==='review'){nv='done';haptic('medium');cel=true;}
        else if(st==='done'){nv='empty';haptic('rigid');}
        else { toast('Ребёнок сам отмечает — подтвердить можно жёлтое ⏳'); return; }
      } else { toast(meIsParent()?'Включи 🔒 режим проверки, чтобы подтверждать детям':'Отмечать можно только свои задания 🙂'); haptic('light'); return; }
    }
    MARKS[key(curDate)+'|'+mid+'|'+tid]=nv; if(cel)celebrate(); render();
    try{ await pushMark(mid,tid,nv); }catch(e){ toast('Нет связи с базой — не сохранилось'); }
  };
  window.setRemind=function(mid,val){ REMIND[mid]=val; try{localStorage.setItem('remind',JSON.stringify(REMIND));}catch(e){} };
  window.toggleMom=function(){ momMode=!momMode; haptic('medium'); render(); };
  window.shiftDay=async function(d){ const nd=addDays(curDate,d); if(nd>today)return; curDate=nd; haptic('light'); render(); try{await loadMarksOnly();render();}catch(e){} };

  window.addTask=async function(mid){ const nm=member(mid); const v=(prompt('Новое дело для '+(nm?nm.name:'')+':')||'').trim(); if(!v)return;
    const id='c'+Date.now(); (CUSTOM[mid]=CUSTOM[mid]||[]).push({id,title:v,icon:'📌'}); render(); haptic('medium'); toast('Дело добавлено');
    try{ await db('custom_tasks',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify({id,member_id:mid,title:v,icon:'📌'})}); }catch(e){ toast('Не сохранилось в базу'); } };
  window.delTask=async function(mid,tid){ CUSTOM[mid]=(CUSTOM[mid]||[]).filter(x=>x.id!==tid); render(); haptic('rigid');
    try{ await db('custom_tasks?id=eq.'+encodeURIComponent(tid),{method:'DELETE',headers:{Prefer:'return=minimal'}}); }catch(e){} };

  function renderShop(){
    let rows=SHOP.map(s=>`<div class="lrow ${s.bought?'bought':''}"><div class="chk" onclick="toggleBuy(${s.id})">${s.bought?'✓':''}</div><div class="lt">${esc(s.text)}</div><button class="addbtn" style="width:38px;background:#5b3d25;border-color:#3c2717" onclick="delBuy(${s.id})">✕</button></div>`).join('');
    if(!SHOP.length) rows='<div class="fail">Список пуст. Добавь, что купить.</div>';
    return `<div class="card"><h2>🛒 Список покупок</h2><div class="add-row"><input id="shopin" placeholder="Что купить? Например: хлеб" onkeydown="if(event.key==='Enter')addBuy()"><button class="addbtn" onclick="addBuy()">+</button></div>${rows}</div>`;
  }
  window.addBuy=async function(){const el=document.getElementById('shopin');const v=el.value.trim();if(!v)return;const id=Date.now();SHOP.unshift({id,text:v,bought:false});if(el)el.blur();render();haptic('medium');toast('Добавлено');
    try{await db('shopping',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify({id,txt:v,bought:false})});}catch(e){toast('Не сохранилось');}};
  window.toggleBuy=async function(id){const s=SHOP.find(x=>x.id===id);if(!s)return;s.bought=!s.bought;render();haptic('light');
    try{await db('shopping?id=eq.'+id,{method:'PATCH',headers:{Prefer:'return=minimal'},body:JSON.stringify({bought:s.bought})});}catch(e){}};
  window.delBuy=async function(id){SHOP=SHOP.filter(x=>x.id!==id);render();haptic('rigid');
    try{await db('shopping?id=eq.'+id,{method:'DELETE',headers:{Prefer:'return=minimal'}});}catch(e){}};

  function whoLabel(w){ if(!w||w==='all')return 'всем'; const m=member(w); return m?m.name:'—'; }
  function renderCal(){
    const sorted=[...EVENTS].sort((a,b)=>new Date(a.date)-new Date(b.date));
    let rows=sorted.map(e=>{const dt=new Date(e.date+'T00:00:00');const diff=Math.round((dt-today)/86400000);let when=diff<0?'прошло':(diff===0?'сегодня':(diff===1?'завтра':'через '+diff+' '+plural(diff,['день','дня','дней'])));
      const whoTag=(e.who&&e.who!=='all')?` · 👤 ${esc(whoLabel(e.who))}`:' · 👥 всем';
      return `<div class="lrow"><div class="datebadge"><b>${dt.getDate()}</b><small>${MONTHS[dt.getMonth()]}</small></div><div class="lt">${esc(e.text)}<div class="when">${when} · ${dt.getFullYear()}${whoTag}</div></div><button class="addbtn" style="width:38px;background:#5b3d25;border-color:#3c2717" onclick="delEv(${e.id})">✕</button></div>`;}).join('');
    if(!EVENTS.length) rows='<div class="fail">Событий нет. Добавь важную дату.</div>';
    const opts='<option value="all">Всем</option>'+DATA.members.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('');
    return `<div class="card"><h2>📅 Важные даты</h2><div class="evform"><label>Что за событие</label><input id="evtxt" placeholder="Например: Йога в библиотеке"><label>Когда</label><input id="evdate" type="date"><label>Кому</label><select id="evwho">${opts}</select><button class="addwide" onclick="addEv()">➕ Добавить событие</button></div>${rows}</div>`;
  }
  window.addEv=async function(){const t=document.getElementById('evtxt'),d=document.getElementById('evdate'),ws=document.getElementById('evwho');if(!t.value.trim()){toast('Впиши название события');return;}if(!d.value){toast('Выбери дату');return;}const who=ws?ws.value:'all';const id=Date.now();EVENTS.push({id,text:t.value.trim(),date:d.value,who});if(t)t.blur();render();haptic('medium');toast('Событие добавлено');
    try{await db('events',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify({id,txt:t.value.trim(),on_date:d.value,who})});}catch(e){toast('Не сохранилось');}};
  window.delEv=async function(id){EVENTS=EVENTS.filter(x=>x.id!==id);render();haptic('rigid');
    try{await db('events?id=eq.'+id,{method:'DELETE',headers:{Prefer:'return=minimal'}});}catch(e){}};

  // ---- Цели: хотелки и штрафы ----
  function wishRow(m,w){ const can=canAdd(m);
    return `<div class="lrow ${w.done?'bought':''}"><div class="chk" onclick="toggleWish(${w.id})">${w.done?'✓':''}</div><div class="lt">${esc(w.title)}${w.note?`<div class="when">${esc(w.note)}</div>`:''}</div>${can?`<button class="addbtn" style="width:34px;background:#5b3d25;border-color:#3c2717" onclick="delWish(${w.id})">✕</button>`:''}</div>`; }
  function wishSection(m,kind,label){ const items=WISHES.filter(w=>w.member===m.id&&w.kind===kind);
    let rows=items.map(w=>wishRow(m,w)).join('');
    if(!items.length) rows=`<div style="color:var(--muted);font-size:12px;padding:2px 2px 8px">пока пусто</div>`;
    const add=canAdd(m)?`<button class="addwide" style="width:100%;margin-bottom:4px" onclick="addWish('${m.id}','${kind}')">➕ ${kind==='want'?'Добавить хотелку':'Добавить штраф'}</button>`:'';
    return `<div style="margin-bottom:6px"><div style="font-size:13px;color:var(--muted);margin:2px 2px 6px">${label}</div>${rows}${add}</div>`; }
  function renderGoals(){
    let h='<div class="card"><h2>🎯 Цели семьи</h2><div class="hint">У каждого свои «Хочу» и «Штрафы». Отмечай галочкой, когда сбылось или закрыл. Добавляют сами и родители.</div></div>';
    DATA.members.forEach(m=>{
      h+=`<div class="member ${ME===m.id?'mine':''}"><div class="m-head"><div class="m-face">${face(m)}</div><div class="m-info"><div class="m-name">${esc(m.name)}${ME===m.id?'<span class="you">ты</span>':''}</div></div></div>`;
      h+=wishSection(m,'want','🎁 Хочу');
      h+=wishSection(m,'fine','⚠️ Штрафы / долги');
      h+='</div>';
    });
    return h;
  }
  window.addWish=async function(mid,kind){ const nm=member(mid); const t=(prompt((kind==='want'?'Хотелка для ':'Штраф для ')+(nm?nm.name:'')+':')||'').trim(); if(!t)return;
    const note=(prompt('Заметка (например «копит к 1 сентября») — или оставь пустым:')||'').trim();
    const id=Date.now(); WISHES.push({id,member:mid,kind,title:t,note,done:false}); render(); haptic('medium'); toast('Добавлено');
    try{ await db('wishes',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify({id,member_id:mid,kind,title:t,note,done:false})}); }catch(e){ toast('Не сохранилось'); } };
  window.toggleWish=async function(id){ const w=WISHES.find(x=>x.id===id); if(!w)return; if(!canAdd(member(w.member))){ toast('Отмечать может сам человек или родитель 🙂'); return; } w.done=!w.done; render(); haptic('light');
    try{ await db('wishes?id=eq.'+id,{method:'PATCH',headers:{Prefer:'return=minimal'},body:JSON.stringify({done:w.done})}); }catch(e){} };
  window.delWish=async function(id){ WISHES=WISHES.filter(x=>x.id!==id); render(); haptic('rigid');
    try{ await db('wishes?id=eq.'+id,{method:'DELETE',headers:{Prefer:'return=minimal'}}); }catch(e){} };

  window.switchTab=async function(name){tab=name;haptic('light');['home','shop','cal','goals'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===name));render(); try{await loadAll();render();}catch(e){}};

  function smallConfetti(){ burst(16); }
  function celebrate(){ burst(46); const hero=document.getElementById('hero'); hero.classList.remove('on'); void hero.offsetWidth; hero.classList.add('on'); setTimeout(()=>hero.classList.remove('on'),4500); }
  function burst(n){ const box=document.getElementById('confetti'); box.classList.add('on'); const cols=['#ffd24a','#3fbf52','#7b5cff','#e0a72e','#6ec1f0','#ff6b6b'];
    for(let i=0;i<n;i++){const d=document.createElement('div');d.className='conf';d.style.left=Math.random()*100+'%';d.style.background=cols[i%cols.length];d.style.animationDuration=(1.5+Math.random()*1.3)+'s';box.appendChild(d);}
    setTimeout(()=>{box.classList.remove('on');box.innerHTML='';},3000); }

  // ---------- boot + polling ----------
  async function boot(){
    const h=document.getElementById('heroImg'); if(DATA.heroImage)h.src=DATA.heroImage;
    try{
      ME = await loadIdentity();
      if(!ME && !TGID){ ME=localStorage.getItem('me_fallback')||null; }
      await loadAll();
      loaded=true; render();
    }catch(e){
      document.getElementById('content').innerHTML='<div class="fail">Не удалось подключиться к базе 😔<br><small>'+esc(String(e).slice(0,120))+'</small></div>';
    }
    // sync каждые 6с (когда открыто и на вкладке заданий, и не мешая вводу)
    setInterval(async()=>{ if(document.hidden)return; if(tab!=='home')return; if(!ME)return; const ae=document.activeElement; if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.tagName==='SELECT'))return; try{ await loadMarksOnly(); render(); }catch(e){} },6000);
  }
  boot();
</script>
</body>
</html>
